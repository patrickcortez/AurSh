name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # Standard runners (Ubuntu, Windows, macOS, Termux cross-compile)
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
          - name: Termux (cross-compile)
            os: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Windows Dependencies
      if: matrix.name == 'Windows'
      shell: powershell
      run: choco install make -y

    - name: Build
      shell: bash
      run: |
        if [ "${{ matrix.name }}" == "Termux (cross-compile)" ]; then
          make build DETECTED_OS=Termux
        else
          make build
        fi

    - name: Install (User Directory)
      shell: bash
      run: |
        if [ "${{ matrix.name }}" == "Termux (cross-compile)" ]; then
          make install-user DETECTED_OS=Termux
        else
          make install-user
        fi

    - name: Test
      if: matrix.name != 'Termux (cross-compile)'
      run: make test

  # Arch Linux runs inside a container (separate job)
  build-arch:
    name: Arch Linux
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged

    steps:
    - uses: actions/checkout@v4

    - name: Configure pacman sandbox
      run: |
        sed -i 's/^#\?SandboxUser.*/SandboxUser = root/' /etc/pacman.conf

    - name: Install dependencies
      run: |
        pacman -Sy --noconfirm python dotnet-sdk

    - name: Build
      run: make build

    - name: Install (User Directory)
      run: make install-user

    - name: Test
      run: make test
