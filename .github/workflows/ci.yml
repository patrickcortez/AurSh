name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest
          - name: Arch Linux
            os: ubuntu-latest
            container: archlinux:base-devel
          - name: Termux
            os: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Arch Linux)
      if: matrix.name == 'Arch Linux'
      run: |
        pacman -Sy --noconfirm python dotnet-sdk

    - name: Setup .NET
      if: matrix.name != 'Arch Linux'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Windows Dependencies
      if: matrix.name == 'Windows'
      run: choco install make -y

    - name: Build
      run: |
        if [ "${{ matrix.name }}" == "Termux" ]; then
          make build DETECTED_OS=Termux
        else
          make build
        fi

    - name: Install (User Directory)
      run: |
        if [ "${{ matrix.name }}" == "Termux" ]; then
          make install-user DETECTED_OS=Termux
        else
          make install-user
        fi

    - name: Test
      if: matrix.name != 'Termux'
      run: |
        if [ "${{ matrix.name }}" == "Windows" ]; then
          python tests/test.py
        else
          make test
        fi
