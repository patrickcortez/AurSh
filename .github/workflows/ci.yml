name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            os: ubuntu-latest
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Make (Windows)
      if: matrix.name == 'Windows'
      run: choco install make -y

    - name: Build
      run: make build

    - name: Test
      run: make test

  # Arch Linux needs a container for pacman-based dependency resolution
  build-arch:
    name: Arch Linux
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged

    steps:
    - uses: actions/checkout@v4

    - name: Configure pacman
      run: |
        sed -i 's/^#\?SandboxUser.*/SandboxUser = root/' /etc/pacman.conf

    - name: Install dependencies
      run: pacman -Sy --noconfirm python icu sdl2

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build
      run: make build

    - name: Diagnose binary
      run: |
        echo "=== Checking binary exists ==="
        ls -la bin/aursh* || true
        echo "=== Checking linked libraries ==="
        ldd bin/aursh 2>&1 || true
        echo "=== Attempting direct run ==="
        ./bin/aursh -c "echo ok" 2>&1 || true

    - name: Test
      run: make test

  # Termux builds are verified via the Release workflow (NativeAOT cross-compile).
  # Termux Docker images are not reliably available in GitHub Actions runners,
  # so Termux-specific testing requires a self-hosted runner or manual testing.
